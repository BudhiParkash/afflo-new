<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Temporarily Unavailable</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #333;
        }

        .container {
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d32f2f;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 25px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">⚠️</div>

    <h1>Website Temporarily Unavailable</h1>

    <p>
        This website is currently offline because the server hosting bill has not been paid.
    </p>

    <p>
        Please contact the website owner or administrator for more information.
    </p>

    <div class="footer">
        We apologize for any inconvenience.
    </div>
</div>

</body>
</html>
